[build]
  command = "npm run build"
  publish = "dist"

# Cache agresivo para assets con hash; el service worker maneja las actualizaciones
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# El service worker nunca debe cachearse en el navegador
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
